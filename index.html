        const calculateGPA = (marks) => {
            const m = Number(marks);
            if (m >= 80) return { point: 5.0, grade: 'A+' };
            if (m >= 70) return { point: 4.0, grade: 'A' };
            if (m >= 60) return { point: 3.5, grade: 'A-' };
            if (m >= 50) return { point: 3.0, grade: 'B' };
            if (m >= 40) return { point: 2.0, grade: 'C' };
            if (m >= 33) return { point: 1.0, grade: 'D' };
            return { point: 0.0, grade: 'F' };
        };

        const calculateTotal = (subjects) => {
            let totalMarks = 0;
            let totalPoints = 0;
            let failed = false;

            subjects.forEach(sub => {
                totalMarks += Number(sub.marks);
                const { point } = calculateGPA(Number(sub.marks));
                totalPoints += point;
                if (point === 0) failed = true;
            });

            const gpa = failed ? 0.00 : (subjects.length ? (totalPoints / subjects.length).toFixed(2) : 0.00);
            const status = failed ? 'Failed' : 'Passed';
            return { totalMarks, gpa, status };
        };

        // --- MAIN APP ---

                const saved = localStorage.getItem('jia_settings');
                return saved ? JSON.parse(saved) : initialSettings;
            });

            const [students, setStudents] = useState(() => {
                const saved = localStorage.getItem('jia_students');
                return saved ? JSON.parse(saved) : initialStudents;
            });

            const [classesList, setClassesList] = useState(() => {

                return saved ? JSON.parse(saved) : initialClasses;
            });

            const [notices, setNotices] = useState(() => {

                return saved ? JSON.parse(saved) : initialNotices;
            });

            });

                return saved ? JSON.parse(saved) : initialLogs;
            });

            const [user, setUser] = useState(null);
            const [route, setRoute] = useState({ path: '/', params: {} });
            
            const [customToast, setCustomToast] = useState(null);
            const [customModal, setCustomModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null });

            useEffect(() => {
                localStorage.setItem('jia_settings', JSON.stringify(settings));
            }, [settings]);

            useEffect(() => {
                localStorage.setItem('jia_students', JSON.stringify(students));
            }, [students]);

            useEffect(() => {
                localStorage.setItem('jia_classes', JSON.stringify(classesList));
            }, [classesList]);

            useEffect(() => {
                localStorage.setItem('jia_notices', JSON.stringify(notices));
            }, [notices]);

            useEffect(() => {
                localStorage.setItem('jia_admins', JSON.stringify(admins));
            }, [admins]);

            useEffect(() => {
                localStorage.setItem('jia_logs', JSON.stringify(logs));
            }, [logs]);

            // Hash router tracking
            useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash || '#/';
                    if (hash.startsWith('#/verify/')) {
                        const serial = hash.split('#/verify/')[1];
                        setRoute({ path: `/verify/${serial}`, params: { serial } });
                    } else if (hash === '#/') {
                        setRoute({ path: '/', params: {} });
                    } else if (hash === '#/notices') {
                        setRoute({ path: '/notices', params: {} });
                    } else if (hash === '#/login') {
                        setRoute({ path: '/login', params: {} });
                    } else if (hash.startsWith('#/admin')) {
                        setRoute({ path: hash.replace('#', ''), params: {} });
                    }
                };
                window.addEventListener('hashchange', handleHashChange);
                handleHashChange(); // Trigger on initial mount
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const addLog = (userLabel, actionText) => {
                const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19);
                setLogs(prev => [{ id: Date.now(), timestamp, user: userLabel, action: actionText }, ...prev]);
            };

            const showToast = (message, type = 'success') => {
                setCustomToast({ message, type });
                setTimeout(() => setCustomToast(null), 4000);
            };

            const showConfirmation = (title, message, onConfirm) => {
                setCustomModal({ isOpen: true, title, message, onConfirm });
            };

            const navigate = (path, params = {}) => {
                if (path === '/') window.location.hash = '#/';

                mother: '', arabicMother: '', 
                dob: '', mobile: '', address: '',
                roll: '', reg: '', serial: `SN${Math.floor(Math.random()*1000000)}`, cert: `CN${Math.floor(Math.random()*1000000)}`,
                className: '', session: '', exam: 'Annual Examination', year: new Date().getFullYear().toString(),

            };

            const [formData, setFormData] = useState(() => {
                if (isNew) return defaultStudentData;
                return students.find(s => s.id === Number(studentId)) || defaultStudentData;
            });

            const handleChange = (e) => setFormData({...formData, [e.target.name]: e.target.value});
            
            const handleSubjectChange = (index, field, value) => {
                const newSubjects = [...formData.subjects];
                newSubjects[index][field] = value;
                setFormData({...formData, subjects: newSubjects});
            };

            const addSubject = () => setFormData({...formData, subjects: [...formData.subjects, { name: '', arabicName: '', marks: 0, grade: '' }]});
            const removeSubject = (index) => setFormData({...formData, subjects: formData.subjects.filter((_, i) => i !== index)});

            const handleSubmit = (e) => {
                e.preventDefault();
                if (user.role === 'Viewer') {
                    showToast('তথ্য পরিবর্তন করার অনুমতি নেই।', 'error');
                    return;
                }
                if (isNew) {
                    setStudents([{...formData, id: Date.now()}, ...students]);
                    showToast('নতুন ছাত্র সফলভাবে যুক্ত হয়েছে!');
                    addLog(user.name, `Created a new student record for "${formData.name}".`);
                } else {
                    setStudents(students.map(s => s.id === Number(studentId) ? formData : s));
                    showToast('ছাত্রের তথ্য সফলভাবে আপডেট হয়েছে!');
                    addLog(user.name, `Updated student record of "${formData.name}".`);

            return (

                                    <div className="w-full">

                                    </div>
                                </div>
                                
                                <div><label className="block text-sm font-bold text-gray-700 mb-1">Student Name (English)</label><input name="name" className="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-500 bg-gray-50 outline-none" value={formData.name} onChange={handleChange} required /></div>

                                <div><label className="block text-sm font-bold text-gray-700 mb-1">Father's Name (English)</label><input name="father" className="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-500 bg-gray-50 outline-none" value={formData.father} onChange={handleChange} required /></div>
                                <div><label className="block text-sm font-bold text-gray-700 mb-1">اسم الوالد (Arabic Father)</label><input name="arabicFather" className="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-500 bg-gray-50 font-arabic outline-none text-right" dir="rtl" value={formData.arabicFather} onChange={handleChange} required /></div>
                                
                                <div><label className="block text-sm font-bold text-gray-700 mb-1">Mother's Name (English)</label><input name="mother" className="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-500 bg-gray-50 outline-none" value={formData.mother} onChange={handleChange} required /></div>

                                <div><label className="block text-sm font-bold text-gray-700 mb-1">Mobile Number</label><input name="mobile" className="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-500 bg-gray-50 outline-none" value={formData.mobile} onChange={handleChange} required /></div>
                                <div className="md:col-span-2"><label className="block text-sm font-bold text-gray-700 mb-1">Address</label><textarea name="address" className="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-500 bg-gray-50 outline-none h-24" value={formData.address} onChange={handleChange} required /></div>

                        {/* Academic & Examination Information */}

                                <div><label className="block text-sm font-bold text-gray-700 mb-1">Roll Number</label><input name="roll" className="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 bg-gray-50 outline-none" value={formData.roll} onChange={handleChange} required /></div>
                                <div><label className="block text-sm font-bold text-gray-700 mb-1">Registration Number</label><input name="reg" className="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 bg-gray-50 outline-none" value={formData.reg} onChange={handleChange} required /></div>

                                <div><label className="block text-sm font-bold text-gray-700 mb-1">Examination Name</label><input name="exam" className="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 bg-gray-50 outline-none" value={formData.exam} onChange={handleChange} required /></div>

                                </div>
                            </div>
                        </section>

                        {/* Subject Marks Entry */}
                        <section>
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b pb-2 mb-4 gap-4">
                                <h3 className="text-lg font-bold text-purple-800 flex items-center gap-2"><Icon name="fileText" size={20}/> Subject Marks Entry</h3>
                                <button type="button" onClick={addSubject} className="w-full sm:w-auto text-sm bg-purple-100 text-purple-700 px-4 py-2 rounded-lg hover:bg-purple-200 font-bold flex items-center justify-center gap-1 transition"><Icon name="plus" size={18}/> Add Subject</button>
                            </div>
                            
                            {formData.subjects.length === 0 ? (
                                <div className="bg-purple-50 rounded-xl border border-purple-100 p-8 text-center text-purple-700 font-medium">কোনো বিষয় যুক্ত করা হয়নি। শুরু করতে "Add Subject" ক্লিক করুন।</div>
                            ) : (
                                <div className="space-y-3">
                                    {formData.subjects.map((sub, index) => (
                                        <div key={index} className="flex flex-col md:flex-row gap-3 md:gap-4 items-center bg-gray-50 p-4 rounded-xl border border-gray-200 relative group">
                                            <div className="hidden md:flex w-8 h-8 bg-white border rounded-full items-center justify-center font-bold text-gray-500 shadow-sm">{index+1}</div>
                                            <input placeholder="Subject Name (English)" className="w-full md:flex-1 p-3 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" value={sub.name} onChange={(e)=>handleSubjectChange(index, 'name', e.target.value)} required />
                                            <input placeholder="اسم المادة (Arabic)" className="w-full md:flex-1 p-3 border rounded-lg focus:ring-2 focus:ring-purple-500 font-arabic outline-none text-right" dir="rtl" value={sub.arabicName} onChange={(e)=>handleSubjectChange(index, 'arabicName', e.target.value)} required />
                                            <div className="flex w-full md:w-auto gap-3 items-center">
                                                <input type="number" placeholder="Marks" className="w-full md:w-28 p-3 border rounded-lg text-center focus:ring-2 focus:ring-purple-500 font-bold outline-none" value={sub.marks} onChange={(e)=>handleSubjectChange(index, 'marks', e.target.value)} required />
                                                <button type="button" onClick={()=>removeSubject(index)} className="p-3 text-red-500 bg-red-50 hover:bg-red-100 rounded-lg transition" title="Remove"><Icon name="trash" size={20}/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {formData.subjects.length > 0 && (
                                <div className="mt-6 bg-green-50 p-4 md:p-6 rounded-xl border border-green-200 flex flex-col md:flex-row justify-between items-center gap-4">
                                    <span className="font-bold text-green-950 text-lg">Metrics Preview:</span>
                                    <div className="flex flex-wrap justify-center gap-4 md:gap-6 text-sm md:text-base bg-white px-6 py-3 rounded-xl shadow-sm border border-green-100">
                                        <span className="font-bold text-gray-700">Total Marks: <span className="text-green-700 text-lg">{calculateTotal(formData.subjects).totalMarks}</span></span>
                                        <span className="font-bold text-gray-700">GPA: <span className="text-green-700 text-lg">{calculateTotal(formData.subjects).gpa}</span></span>
                                        <span className="font-bold text-gray-700">Status: <span className={`text-lg font-bold ${calculateTotal(formData.subjects).status==='Passed'?'text-green-600':'text-red-600'}`}>{calculateTotal(formData.subjects).status}</span></span>
                                    </div>
                                </div>
                            )}
                        </section>

                        <div className="pt-8 border-t flex flex-col-reverse sm:flex-row justify-end gap-4">
                            <button type="button" onClick={()=>navigate('/admin/students')} className="w-full sm:w-auto px-6 py-3.5 border border-gray-300 rounded-xl text-gray-700 hover:bg-gray-100 font-bold transition">Cancel</button>
                            <button type="submit" className="w-full sm:w-auto px-8 py-3.5 bg-green-700 hover:bg-green-800 text-white rounded-xl shadow font-bold transition">
                                {isNew ? 'Save Student Record' : 'Update Student Record'}
                            </button>
                        </div>
                    </form>
                </div>
            );
        }

        // --- ADMIN CLASSES ---
        function AdminClasses({ classesList, setClassesList, showToast, showConfirmation, addLog, user }) {
            const [newClass, setNewClass] = useState('');

            const handleAdd = (e) => {
                e.preventDefault();
                if (user.role === 'Viewer') {
                    showToast('শ্রেণী যুক্ত করার অনুমতি নেই।', 'error');
                    return;
                }
                if (newClass.trim() !== '') {
                    setClassesList([...classesList, { id: Date.now(), name: newClass.trim() }]);
                    addLog(user.name, `Added class "${newClass.trim()}".`);
                    showToast(`Class "${newClass.trim()}" added.`);
                    setNewClass('');
                }
            };

            const handleDelete = (id, name) => {
                if (user.role === 'Viewer') {
                    showToast('শ্রেণী ডিলিট করার অনুমতি নেই।', 'error');
                    return;
                }
                showConfirmation(
                    'শ্রেণী মুছে ফেলতে চান?',
                    `আপনি কি শ্রেণী "${name}" মুছে ফেলতে চান? এর সাথে যুক্ত ছাত্রদের রেকর্ডে সমস্যা হতে পারে।`,
                    () => {
                        setClassesList(classesList.filter(c => c.id !== id));
                        addLog(user.name, `Deleted class "${name}".`);
                        showToast(`শ্রেণী "${name}" সফলভাবে মুছে ফেলা হয়েছে।`);
                    }
                );

                    <form onSubmit={handleAdd} className="bg-white p-5 md:p-6 rounded-2xl shadow border border-gray-200 mb-6 flex flex-col sm:flex-row items-end gap-4">

                            <label className="block text-sm font-bold text-gray-700 mb-2">New Class Name</label>
                            <input type="text" placeholder="e.g. Kamil 2nd Year" className="w-full p-3 bg-gray-50 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none" value={newClass} onChange={e=>setNewClass(e.target.value)} required />
                        </div>
                        <button type="submit" className="w-full sm:w-auto bg-green-700 hover:bg-green-800 text-white px-8 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition shadow">
                            <Icon name="plus" size={20}/> Add Class
                        </button>
                    </form>

                    <div className="bg-white rounded-2xl shadow border border-gray-200 overflow-hidden">
                        <table className="w-full text-sm text-left">
                            <thead className="bg-gray-50 text-gray-500 uppercase text-xs font-semibold">
                                <tr>
                                    <th className="px-6 py-4">Class Name</th>
                                    <th className="px-6 py-4 text-right w-24">Actions</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {classesList.map(c => (
                                    <tr key={c.id} className="hover:bg-gray-50 transition">
                                        <td className="px-6 py-4 font-bold text-gray-800 text-base">{c.name}</td>
                                        <td className="px-6 py-4 text-right">
                                            <button onClick={() => handleDelete(c.id, c.name)} className="p-2 bg-red-50 text-red-500 hover:bg-red-100 hover:text-red-700 rounded-lg transition"><Icon name="trash" size={18}/></button>
                                        </td>
                                    </tr>
                                ))}
                                {classesList.length === 0 && <tr><td colSpan="2" className="px-6 py-8 text-center text-gray-500">No classes configured.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>

        }

        // --- WEBSITE SETTINGS ---

                    showToast('সেটিংস পরিবর্তন করার অনুমতি নেই।', 'error');

                <div className="max-w-4xl mx-auto pb-10">

                    <form onSubmit={handleSubmit} className="bg-white rounded-2xl shadow border border-gray-200 p-5 md:p-8 space-y-6">

                            <div><label className="block text-sm font-bold text-gray-700 mb-1">Short Name</label><input name="shortName" className="w-full p-3 border rounded-xl bg-gray-50 focus:ring-2 focus:ring-green-500 outline-none" value={formData.shortName} onChange={handleChange} required /></div>

        // --- ADMIN NOTICES ---
        function AdminNotices({ notices, setNotices, showToast, showConfirmation, addLog, user }) {

                    return;

                setNotices([{ id: Date.now(), title, date }, ...notices]);

                if (user.role === 'Viewer') {
                    showToast('নোটিশ ডিলিট করার অনুমতি নেই।', 'error');
                    return;
                }
                showConfirmation(
                    'নোটিশটি ডিলিট করতে চান?',
                    `এই নোটিশটি: "${label}" পাবলিক নোটিশ বোর্ড থেকে স্থায়ীভাবে ডিলিট করা হবে।`,
                    () => {
                        setNotices(notices.filter(n => n.id !== id));

                <div className="max-w-4xl mx-auto">

                    <form onSubmit={handleAdd} className="bg-white p-5 md:p-6 rounded-2xl shadow border border-gray-200 mb-6 flex flex-col md:flex-row items-end gap-4">
                        <div className="flex-1 w-full">
                            <label className="block text-sm font-bold text-gray-700 mb-2">Notice Title</label>
                            <input type="text" className="w-full p-3 bg-gray-50 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none" value={title} onChange={e=>setTitle(e.target.value)} required />
                        </div>
                        <div className="w-full md:w-auto">
                            <label className="block text-sm font-bold text-gray-700 mb-2">Date</label>
                            <input type="date" className="w-full p-3 bg-gray-50 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none" value={date} onChange={e=>setDate(e.target.value)} required />
                        </div>
                        <button type="submit" className="w-full md:w-auto bg-green-700 hover:bg-green-800 text-white px-8 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition shadow h-[50px]">
                            <Icon name="plus" size={20}/> Post Notice
                        </button>
                    </form>

                    <div className="bg-white rounded-2xl shadow border border-gray-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm text-left whitespace-nowrap">
                                <thead className="bg-gray-50 text-gray-500 uppercase text-xs font-semibold">
                                    <tr>
                                        <th className="px-6 py-4 w-32">Date</th>
                                        <th className="px-6 py-4">Notice Title</th>
                                        <th className="px-6 py-4 text-right w-24">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    {notices.map(notice => (
                                        <tr key={notice.id} className="hover:bg-gray-50 transition">
                                            <td className="px-6 py-4 font-medium text-gray-600 bg-gray-50/50">{notice.date}</td>
                                            <td className="px-6 py-4 font-bold text-gray-800 text-base whitespace-normal min-w-[200px]">{notice.title}</td>
                                            <td className="px-6 py-4 text-right">
                                                <button onClick={() => handleDelete(notice.id, notice.title)} className="p-2 bg-red-50 text-red-500 hover:bg-red-100 hover:text-red-700 rounded-lg transition"><Icon name="trash" size={18}/></button>
                                            </td>
                                        </tr>
                                    ))}
                                    {notices.length === 0 && <tr><td colSpan="3" className="px-6 py-8 text-center text-gray-500">কোনো নোটিশ নেই।</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // --- SUPER ADMIN PAGE ---
        function SuperAdminPage({ 
            admins, setAdmins, logs, setLogs, 
            students, setStudents, settings, setSettings, classesList, setClassesList, notices, setNotices,
            showToast, showConfirmation, addLog, user 
        }) {
            const [newAdmin, setNewAdmin] = useState({ name: '', email: '', password: '', role: 'Editor' });
            const [importJson, setImportJson] = useState('');

            const handleCreateAdmin = (e) => {
                e.preventDefault();
                if (admins.some(a => a.email === newAdmin.email)) {
                    showToast('এই ইমেইল দিয়ে অলরেডি অ্যাডমিন রয়েছে।', 'error');
                    return;
                }
                setAdmins([...admins, { ...newAdmin, id: Date.now() }]);
                addLog(user.name, `Created new administrator profile: ${newAdmin.name} (${newAdmin.role})`);
                showToast(`Administrator profile ${newAdmin.name} created!`);
                setNewAdmin({ name: '', email: '', password: '', role: 'Editor' });
            };

            const handleDeleteAdmin = (id, name) => {
                if (id === 1) {
                    showToast('মূল সুপার অ্যাডমিন মুছে ফেলা সম্ভব নয়!', 'error');
                    return;
                }
                showConfirmation(
                    'অ্যাডমিন রিমুভ করতে চান?',
                    `আপনি কি অ্যাডমিন "${name}" কে প্যানেল থেকে মুছে ফেলতে চান?`,
                    () => {
                        setAdmins(admins.filter(a => a.id !== id));
                        addLog(user.name, `Removed administrator account of: ${name}`);
                        showToast('Administrator profile removed.');
                    }
                );
            };

            const exportBackup = () => {
                const backupData = { settings, students, classesList, notices, admins, logs };
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `madrasha_portal_backup_${new Date().toISOString().slice(0,10)}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
                showToast('ডাটাবেজ ব্যাকআপ ফাইল ডাউনলোড সম্পন্ন হয়েছে!');
            };

            const importBackup = (e) => {
                e.preventDefault();
                try {
                    const parsed = JSON.parse(importJson);
                    if (parsed.settings && parsed.students && parsed.classesList) {
                        setSettings(parsed.settings);
                        setStudents(parsed.students);
                        setClassesList(parsed.classesList);
                        if (parsed.notices) setNotices(parsed.notices);
                        if (parsed.admins) setAdmins(parsed.admins);
                        if (parsed.logs) setLogs(parsed.logs);
                        
                        showToast('ডাটা সফলভাবে রিস্টোর হয়েছে!');
                        addLog(user.name, 'Restored a database backup file.');
                        setImportJson('');
                    } else {
                        showToast('ভুল ফাইল ফরম্যাট।', 'error');
                    }
                } catch (err) {
                    showToast('JSON কোড পার্স করতে ব্যর্থ হয়েছে।', 'error');
                }
            };

            const exportCSV = () => {
                let csvContent = "data:text/csv;charset=utf-8,";
                csvContent += "ID,Student Name,Roll,Registration,Class,Passing Year,GPA,Status\n";
                students.forEach(s => {
                    const { gpa, status } = calculateTotal(s.subjects);
                    csvContent += `${s.id},"${s.name}",${s.roll},${s.reg},"${s.className}",${s.year},${gpa},${status}\n`;
                });
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "student_records.csv");
                document.body.appendChild(link);
                link.click();
                link.remove();
                showToast('CSV ফাইল সফলভাবে ডাউনলোড হয়েছে।');
            };

            return (
                <div className="max-w-6xl mx-auto space-y-8 pb-12">
                    <h2 className="text-2xl font-extrabold text-gray-800 flex items-center gap-2"><Icon name="shield" className="text-red-600"/> Super Admin Console</h2>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 space-y-6">
                            <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                                <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><Icon name="users" size={20}/> Admin Roles & Permissions</h3>
                                <form onSubmit={handleCreateAdmin} className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-6 items-end">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-600 mb-1">Full Name</label>
                                        <input type="text" className="w-full p-2 border rounded-xl focus:ring-1 focus:ring-green-500 bg-gray-50 text-sm" value={newAdmin.name} onChange={e=>setNewAdmin({...newAdmin, name: e.target.value})} required/>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-600 mb-1">Email</label>
                                        <input type="email" className="w-full p-2 border rounded-xl focus:ring-1 focus:ring-green-500 bg-gray-50 text-sm" value={newAdmin.email} onChange={e=>setNewAdmin({...newAdmin, email: e.target.value})} required/>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-600 mb-1">Password</label>
                                        <input type="password" className="w-full p-2 border rounded-xl focus:ring-1 focus:ring-green-500 bg-gray-50 text-sm" value={newAdmin.password} onChange={e=>setNewAdmin({...newAdmin, password: e.target.value})} required/>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-600 mb-1">Role Type</label>
                                        <select className="w-full p-2 border rounded-xl focus:ring-1 focus:ring-green-500 bg-gray-50 text-sm" value={newAdmin.role} onChange={e=>setNewAdmin({...newAdmin, role: e.target.value})}>
                                            <option value="Super Admin">Super Admin</option>
                                            <option value="Editor">Editor</option>
                                            <option value="Viewer">Viewer</option>
                                        </select>
                                    </div>
                                    <button type="submit" className="md:col-span-4 bg-green-700 hover:bg-green-800 text-white font-bold p-2.5 rounded-xl transition shadow-sm text-sm">
                                        Create Administrator
                                    </button>
                                </form>

                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm text-left">
                                        <thead className="bg-gray-50 text-gray-500">
                                            <tr>
                                                <th className="px-4 py-2">Staff Member</th>
                                                <th className="px-4 py-2">Role Type</th>
                                                <th className="px-4 py-2 text-right">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {admins.map(admin => (
                                                <tr key={admin.id} className="hover:bg-gray-50">
                                                    <td className="px-4 py-3 font-semibold text-gray-800">
                                                        <div>{admin.name}</div>
                                                        <div className="text-xs text-gray-400 font-mono">{admin.email}</div>
                                                    </td>
                                                    <td className="px-4 py-3 text-xs"><span className="bg-blue-100 text-blue-800 px-2.5 py-1 rounded-full font-bold">{admin.role}</span></td>
                                                    <td className="px-4 py-3 text-right">
                                                        <button onClick={()=>handleDeleteAdmin(admin.id, admin.name)} className="text-red-500 hover:text-red-700"><Icon name="trash" size={16}/></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                                <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><Icon name="activity" size={20}/> Security & Audit Logs</h3>
                                <div className="bg-gray-900 text-green-400 p-4 rounded-xl font-mono text-xs max-h-60 overflow-y-auto space-y-2 border shadow-inner">
                                    {logs.map(log => (
                                        <div key={log.id} className="border-b border-gray-800 pb-1">
                                            <span className="text-yellow-400 font-bold">[{log.timestamp}]</span>{' '}
                                            <span className="text-blue-400">({log.user}):</span>{' '}
                                            <span className="text-white">{log.action}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="space-y-6">
                            <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                                <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><Icon name="database" size={20}/> Backup & Restore</h3>
                                <div className="space-y-4">
                                    <button onClick={exportBackup} className="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold p-3 rounded-xl flex items-center justify-center gap-2 shadow-sm transition">
                                        <Icon name="database" size={18}/> Export Backup JSON
                                    </button>
                                    
                                    <button onClick={exportCSV} className="w-full bg-indigo-700 hover:bg-indigo-800 text-white font-bold p-3 rounded-xl flex items-center justify-center gap-2 shadow-sm transition">
                                        <Icon name="fileSpreadsheet" size={18}/> Export Excel/CSV Sheet
                                    </button>

                                    <form onSubmit={importBackup} className="border-t pt-4">
                                        <label className="block text-sm font-bold text-gray-700 mb-2">Paste Backup JSON Code</label>
                                        <textarea className="w-full p-2 border rounded-xl font-mono text-xs bg-gray-50 h-32 focus:ring-1 focus:ring-green-500 outline-none" placeholder='{"settings": {...}, "students": [...] }' value={importJson} onChange={e=>setImportJson(e.target.value)} required/>
                                        <button type="submit" className="w-full mt-2 bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-2 px-4 rounded-xl transition shadow-sm text-sm">
                                            Restore Backup
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- RENDER APP ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
